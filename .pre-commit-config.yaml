repos:
  # Black — kod formatlash
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11

  # isort — importlarni tartibga solish
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  # flake8 — linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8

  # Umumiy tekshiruvlar
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace    # qator oxiridagi bo'sh joy
      - id: end-of-file-fixer      # fayl oxirida yangi qator
      - id: check-yaml             # yaml sintaksis
      - id: check-merge-conflict   # merge conflict belgilari
